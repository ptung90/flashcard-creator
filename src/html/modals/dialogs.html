    <!-- Schema Editor Modal -->
    <dialog id="schema-editor-modal">
      <div class="dialog-header">
        <span class="dialog-title">Schema Editor</span>
        <button class="btn btn-sm modal-close" onclick="closeSchemaEditor()">×</button>
      </div>
      <div class="dialog-body" id="schema-editor-content"></div>
      <div class="dialog-footer">
        <div style="display:flex;gap:4px;align-items:center;margin-right:auto">
          <select id="schema-library-select" style="width:130px;height:26px;font-size:12px"><option value="">— library —</option></select>
          <button class="btn btn-sm btn-secondary" onclick="applySchemaFromLibrary()">Load</button>
          <button class="btn btn-sm btn-secondary" onclick="saveSchemaToLibrary()">Save</button>
          <button class="btn btn-sm btn-secondary" onclick="saveAllSchemasToLibrary()" title="Save all schemas as a bundle">Save All</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSchemaFromLibrary()">Delete</button>
        </div>
        <button class="btn btn-sm btn-primary" onclick="saveSchema()">Save</button>
        <button class="btn btn-sm btn-secondary" onclick="closeSchemaEditor()">Cancel</button>
      </div>
    </dialog>

    <!-- Pack Dialog -->
    <dialog id="pack-dialog">
      <div class="dialog-header">
        <span class="dialog-title">Pack into <span id="pack-dialog-layout" style="font-family:'SF Mono',Consolas,monospace;"></span></span>
        <button class="btn btn-sm modal-close" onclick="closePackDialog()">×</button>
      </div>
      <div class="dialog-body">
        <div id="pack-dialog-records"></div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-sm btn-primary" onclick="confirmPack()">Pack</button>
        <button class="btn btn-sm btn-secondary" onclick="closePackDialog()">Cancel</button>
      </div>
    </dialog>

    <!-- Backup Modal -->
    <dialog id="backup-modal">
      <div class="dialog-header">
        <span class="dialog-title" id="backup-modal-title">Backups</span>
        <button class="btn btn-sm modal-close" onclick="closeBackupModal()">×</button>
      </div>
      <div class="dialog-body" id="backup-list" style="padding:0"></div>
      <div class="dialog-footer">
        <button class="btn btn-sm btn-primary" style="margin-right:auto" onclick="manualBackup(this)">Backup Now</button>
        <button class="btn btn-sm btn-secondary" onclick="closeBackupModal()">Close</button>
      </div>
    </dialog>

    <!-- Records AI (Copy for AI) Modal -->
    <dialog id="records-ai-modal">
      <div class="dialog-header">
        <span class="dialog-title">✦ Copy Records for AI</span>
        <button class="btn btn-sm modal-close" onclick="closeRecordsAiModal()">×</button>
      </div>
      <div class="dialog-body" style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;color:var(--ink-500)">Enter names (one per line). AI will fill all other fields.</span>
          <button class="btn btn-sm btn-secondary" onclick="pasteRecordsAiNames()">Paste</button>
        </div>
        <textarea id="records-ai-names" rows="12" style="width:100%;font-family:monospace;font-size:13px;resize:vertical;box-sizing:border-box;padding:8px;border:1px solid var(--border);border-radius:4px" placeholder="Name 1&#10;Name 2&#10;Name 3..."></textarea>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-sm btn-secondary" onclick="closeRecordsAiModal()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="executeRecordsAiCopy()">✦ Copy for AI</button>
      </div>
    </dialog>

    <!-- Generate Records Dialog -->
    <dialog id="generate-records-dialog">
      <div class="dialog-header">
        <span class="dialog-title">✦ Generate Records</span>
        <button class="btn btn-sm modal-close" onclick="closeGenerateRecordsDialog()">×</button>
      </div>
      <div class="dialog-body" style="display:flex;flex-direction:column;gap:10px;min-width:300px">
        <div style="display:flex;align-items:center;gap:10px">
          <label style="font-size:13px;white-space:nowrap">How many?</label>
          <input id="gen-records-count" type="number" min="1" max="50" value="5"
            style="width:70px;height:28px;font-size:13px;border:1px solid var(--line-strong);border-radius:4px;padding:0 6px">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:var(--ink-500)">Topic / hint (optional)</label>
          <input id="gen-records-hint" type="text" placeholder='e.g. "Birds of Southeast Asia"'
            style="height:30px;font-size:13px;border:1px solid var(--line-strong);border-radius:4px;padding:0 8px"
            onkeydown="if(event.key==='Enter')executeGenerateRecords()">
        </div>
        <div id="gen-records-locale-row" style="display:none;align-items:center;gap:10px">
          <label style="font-size:13px;white-space:nowrap">Fill locale</label>
          <select id="gen-records-locale"
            style="height:28px;font-size:13px;border:1px solid var(--line-strong);border-radius:4px;padding:0 6px"></select>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-sm btn-secondary" onclick="closeGenerateRecordsDialog()">Cancel</button>
        <button id="gen-records-btn" class="btn btn-sm btn-primary" onclick="executeGenerateRecords()">✦ Generate</button>
      </div>
    </dialog>

    <!-- AI Chat Panel (Messenger-style floating) -->
    <div id="ai-chat-panel" class="ai-chat-panel" style="display:none">
      <div class="ai-chat-panel-header" onclick="toggleAiChatMinimize(event)">
        <span class="ai-chat-panel-title">✦ AI Assistant</span>
        <div class="ai-chat-panel-actions">
          <button class="ai-chat-hdr-btn" onclick="event.stopPropagation();toggleAiChatMinimize()" title="Minimize">–</button>
          <button class="ai-chat-hdr-btn" onclick="event.stopPropagation();closeAiChat()" title="Close">×</button>
        </div>
      </div>
      <div class="ai-chat-panel-body">
        <div id="ai-chat-messages" class="ai-chat-messages"></div>
        <div class="ai-chat-footer">
          <div class="ai-chat-footer-top">
            <select id="ai-chat-template-select" onchange="onAiTemplateChange()"></select>
            <select id="ai-chat-locale-select" style="display:none" title="Target locale"></select>
            <select id="ai-chat-model-select" onchange="onAiChatModelChange(this.value)" title="Model"></select>
          </div>
          <div class="ai-chat-input-row">
            <textarea id="ai-chat-input" rows="2"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiChat();}"></textarea>
            <button id="ai-chat-send-btn" class="btn btn-primary btn-sm" onclick="sendAiChat()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Convert Cards to Records Dialog -->
    <dialog id="convert-cards-dialog">
      <div class="dialog-header">
        <span class="dialog-title">↩ Convert cards to records</span>
        <button class="btn btn-sm modal-close" onclick="closeConvertDialog()">×</button>
      </div>
      <div class="dialog-body" style="padding:0">
        <div style="padding:8px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;user-select:none">
            <input type="checkbox" id="convert-select-all" checked onchange="toggleConvertSelectAll(this.checked)">
            Select all
          </label>
          <span id="convert-selection-count" style="font-size:11px;color:var(--ink-400);margin-left:auto"></span>
          <label style="font-size:12px;display:flex;align-items:center;gap:4px;margin-left:8px">
            Locale
            <select id="convert-locale-select" style="height:24px;font-size:12px;border:1px solid var(--line-strong);border-radius:4px;padding:0 4px"></select>
          </label>
        </div>
        <div id="convert-cards-list" style="max-height:340px;overflow-y:auto;padding:8px 14px"></div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-sm btn-secondary" onclick="closeConvertDialog()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="executeConvert()">↩ Convert selected</button>
      </div>
    </dialog>

    <!-- Export PDF Dialog -->
    <dialog id="export-pdf-dialog">
      <div class="dialog-header">
        <span class="dialog-title">Export PDF</span>
        <button class="btn btn-sm modal-close" onclick="document.getElementById('export-pdf-dialog').close()">×</button>
      </div>
      <div class="dialog-body" style="display:flex;flex-direction:column;gap:14px;min-width:280px">
        <div class="dialog-section">
          <div class="dialog-section-title">Page Orientation</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="radio" name="pdf-orient" value="" checked> ↕↔ Mixed <span style="font-size:11px;color:var(--ink-400)">(keep each card's orientation)</span>
            </label>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="radio" name="pdf-orient" value="portrait"> ↕ All Portrait <span style="font-size:11px;color:var(--ink-400)">(rotate landscape cards)</span>
            </label>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="radio" name="pdf-orient" value="landscape"> ↔ All Landscape <span style="font-size:11px;color:var(--ink-400)">(rotate portrait cards)</span>
            </label>
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-sm btn-secondary" onclick="document.getElementById('export-pdf-dialog').close()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="runExportPdf()">
          <svg class="icon" style="width:13px;height:13px"><use href="#i-download"/></svg> Export PDF
        </button>
      </div>
    </dialog>
