    <!-- JSON Export Modal -->
    <dialog id="json-modal" style="max-width:480px;width:100%">
        <div class="modal-header">
          <span data-i18n="json.modalTitle">Export / Copy JSON</span>
          <button class="modal-close" onclick="closeJsonModal()">×</button>
        </div>
        <div class="modal-body" style="padding:14px;display:flex;flex-direction:column;gap:10px">

          <div class="json-actions-grid">
            <button class="btn btn-secondary json-action-btn" onclick="exportJsonFile()">
              <span class="json-action-icon">⬇</span>
              <span>
                <span class="json-action-label" data-i18n="json.exportFile">Export to file</span>
                <span class="json-action-desc" data-i18n="json.exportFileDesc">Download as .json</span>
              </span>
            </button>
            <button class="btn btn-secondary json-action-btn" onclick="pasteJsonLoad()">
              <span class="json-action-icon">📋</span>
              <span>
                <span class="json-action-label" data-i18n="json.pasteLoad">Paste & Load</span>
                <span class="json-action-desc" data-i18n="json.pasteLoadDesc">Load project from clipboard JSON</span>
              </span>
            </button>
            <button class="btn btn-secondary json-action-btn" onclick="copyJsonFull()">
              <span class="json-action-icon">⎘</span>
              <span>
                <span class="json-action-label" data-i18n="json.copyFull">Copy JSON</span>
                <span class="json-action-desc" data-i18n="json.copyFullDesc">Full project including images</span>
              </span>
            </button>
            <button class="btn btn-secondary json-action-btn" onclick="copyJsonNoImg()">
              <span class="json-action-icon">⎘</span>
              <span>
                <span class="json-action-label" data-i18n="json.copyNoImg">Copy JSON (no images)</span>
                <span class="json-action-desc" data-i18n="json.copyNoImgDesc">Images replaced with placeholder URL</span>
              </span>
            </button>
            <button class="btn btn-secondary json-action-btn" onclick="copyJsonForAI()">
              <span class="json-action-icon">✦</span>
              <span>
                <span class="json-action-label">Copy for AI</span>
                <span class="json-action-desc">Prompt + JSON, paste vào AI Studio</span>
              </span>
            </button>
            <button class="btn btn-secondary json-action-btn" onclick="openJsonEditor()">
              <span class="json-action-icon">✏</span>
              <span>
                <span class="json-action-label">Edit JSON</span>
                <span class="json-action-desc">Open current project in JSON editor</span>
              </span>
            </button>
          </div>

          <hr style="border:none;border-top:1px solid var(--c-border);margin:2px 0">

          <!-- AI section -->
          <div class="ai-section">
            <div class="ai-section-header">
              <span>✦ AI</span>
              <div class="ai-provider-row">
                <button class="ai-provider-btn active" data-provider="gemini" onclick="switchAiProvider('gemini')">Gemini</button>
                <button class="ai-provider-btn" data-provider="openai" onclick="switchAiProvider('openai')">OpenAI</button>
              </div>
            </div>

            <div id="ai-key-gemini" class="ai-key-body">
              <div class="ai-key-row">
                <label class="ai-key-label">API Key</label>
                <div class="ai-key-input-group">
                  <input type="password" id="gemini-key" placeholder="AIza..." class="ai-key-input">
                  <button class="btn btn-secondary btn-sm" onclick="saveAiKey('gemini')">Save</button>
                </div>
              </div>
              <div class="ai-key-row">
                <label class="ai-key-label">Model</label>
                <input type="text" id="gemini-model" list="gemini-model-list"
                  placeholder="gemini-2.5-flash-preview-05-20" class="ai-key-input"
                  onchange="localStorage.setItem('gemini-model', this.value)">
                <datalist id="gemini-model-list">
                  <option value="gemini-2.0-flash"></option>
                  <option value="gemini-2.5-flash-preview-05-20"></option>
                  <option value="gemini-2.5-pro-preview-05-06"></option>
                </datalist>
              </div>
            </div>

            <div id="ai-key-openai" class="ai-key-body" style="display:none">
              <div class="ai-key-row">
                <label class="ai-key-label">API Key</label>
                <div class="ai-key-input-group">
                  <input type="password" id="openai-key" placeholder="sk-..." class="ai-key-input">
                  <button class="btn btn-secondary btn-sm" onclick="saveAiKey('openai')">Save</button>
                </div>
              </div>
            </div>

            <div class="ai-generate-row">
              <input type="text" id="ai-subject" class="ai-subject-input"
                placeholder="New subject (e.g. Tiger, Blue whale...)"
                onkeydown="if(event.key==='Enter')aiGenerateProject();">
              <button class="btn btn-primary btn-sm" id="ai-generate-btn" onclick="aiGenerateProject()">✦ Go</button>
            </div>
            <div id="ai-status" class="ai-status"></div>
          </div>

        </div>
      </dialog>
