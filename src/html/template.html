          <svg class="icon"><use href="#i-printer"/></svg><span class="btn-label" data-i18n="toolbar.printAll">Print All</span>
        </button>
        <button class="btn btn-primary btn-sm" onclick="exportPDF()" data-i18n-title="toolbar.pdfAll" title="Export PDF (all)">
          <svg class="icon"><use href="#i-download"/></svg><span class="btn-label" data-i18n="toolbar.pdfAll">PDF All</span>
        </button>

        <!-- More menu -->
        <div class="toolbar-more-wrap">
          <button class="btn btn-secondary btn-sm btn-icon" id="toolbar-more-btn" onclick="toggleMoreMenu(event)" title="More options" aria-pressed="false">
            <svg class="icon"><use href="#i-more"/></svg>
          </button>
          <div class="toolbar-more-menu" id="toolbar-more-menu">
            <button class="toolbar-more-item" onclick="openSettingsModal();closeMoreMenu()">
              <svg class="icon"><use href="#i-settings"/></svg> Settings
            </button>
            <button class="toolbar-more-item" onclick="openCssModal();closeMoreMenu()">
              <svg class="icon"><use href="#i-braces"/></svg> Custom CSS
            </button>
            <button class="toolbar-more-item" onclick="openJsonModal();closeMoreMenu()">
              <svg class="icon"><use href="#i-code"/></svg> JSON
            </button>
            <button class="toolbar-more-item" onclick="openBackupModal();closeMoreMenu()">
              <svg class="icon"><use href="#i-undo"/></svg> Backups
            </button>
            <div class="toolbar-more-sep"></div>
            <div class="toolbar-more-lang">
              <button class="btn btn-secondary btn-sm lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
              <button class="btn btn-secondary btn-sm lang-btn" data-lang="vi" onclick="setLang('vi')">VI</button>
            </div>
            <div class="toolbar-more-sep"></div>
            <span id="app-version" class="toolbar-more-version"></span>
          </div>
        </div>

        <span class="toolbar-meta">
          <div class="btn-group">
            <button class="btn btn-secondary btn-sm" onclick="changeUIZoom(-0.1)" data-i18n-title="set.zoom.dec" title="Decrease UI size">A−</button>
            <button class="btn btn-secondary btn-sm" onclick="changeUIZoom(0.1)" data-i18n-title="set.zoom.inc" title="Increase UI size">A+</button>
          </div>
        </span>
      </div>

      <!-- Main 3-panel -->
      <div class="fc-main">
        <!-- Sidebar: Card List -->
        <div class="fc-sidebar" id="fc-sidebar">
          <div class="fc-sidebar-header">
            <span>
              <span data-i18n="sidebar.cards">Cards</span>
              <span id="card-count" style="color: #9ca3af; font-weight: normal"
                >0</span
              >
            </span>
            <div class="view-toggle">
              <button
                class="view-toggle-btn"
                id="view-list-btn"
                onclick="setViewMode('list')"
                data-i18n-title="sidebar.listView"
                title="List view"
              >
                <svg width="16" height="16"><use href="#i-list"/></svg>
              </button>
              <button
                class="view-toggle-btn"
                id="view-grid-btn"
                onclick="setViewMode('grid')"
                data-i18n-title="sidebar.gridView"
                title="Grid view"
              >
                <svg width="16" height="16"><use href="#i-grid"/></svg>
              </button>
            </div>
            <!-- <div class="search-tab" data-tab="data" onclick="switchTab(this)">
              Data
            </div> -->
          </div>
          <div class="fc-card-list" id="card-list"></div>
        </div>

        <div class="fc-panel-divider" data-panel="fc-sidebar"></div>

        <!-- Editor -->
        <div class="fc-editor" id="fc-editor">
          <div
            class="fc-editor-empty"
            id="editor-empty"
            data-i18n="editor.empty"
          >
            Select a card to edit, or click "+ New Card"
          </div>
          <div id="editor-content" style="display: none"></div>
        </div>

        <div class="fc-panel-divider" data-panel="fc-preview-panel"></div>

        <!-- Preview -->
        <div class="fc-preview-panel" id="fc-preview-panel">
          <div class="fc-preview-header">
            <div style="display: flex; align-items: center; gap: 4px">
              <div class="fc-preview-label" data-i18n="preview.label">Preview</div>
              <button class="btn btn-secondary btn-sm btn-icon" onclick="changePreviewZoom(-0.25)" title="Zoom out"><svg class="icon"><use href="#i-minus"/></svg></button>
              <span id="preview-zoom-label" onclick="changePreviewZoom(0)" title="Reset zoom" style="cursor:pointer;min-width:32px;text-align:center;font-size:11px;color:#374151;user-select:none">100%</span>
              <button class="btn btn-secondary btn-sm btn-icon" onclick="changePreviewZoom(0.25)" title="Zoom in"><svg class="icon"><use href="#i-plus"/></svg></button>
              <button class="btn btn-secondary btn-sm" onclick="setPhysicalZoom()" title="Actual print size (96dpi reference)" style="font-size:10px;font-weight:600">1:1</button>
              <button class="btn btn-secondary btn-sm btn-icon" onclick="changePreviewZoom(0)" title="Fit to panel"><svg class="icon"><use href="#i-maximize"/></svg></button>
            </div>
            <div class="fc-preview-actions">
              <button class="btn btn-secondary btn-sm" onclick="printOne()"><svg class="icon"><use href="#i-printer"/></svg> <span data-i18n="preview.print">Print</span></button>
              <button class="btn btn-primary btn-sm" onclick="exportOnePDF()"><svg class="icon"><use href="#i-download"/></svg> <span data-i18n="preview.export">Export PDF</span></button>
            </div>
          </div>
          <div class="fc-preview" id="fc-preview">
            <div id="preview-card-wrap"></div>
          </div>

          <div id="tab-data" style="display: none">
            <div class="url-input-area">
              <label style="color: #888; font-size: 12px"
                >Current Slot & Card Data:</label
              >
              <textarea
                id="data-tab-content"
                style="
                  width: 100%;
                  height: 250px;
                  background: #f9fafb;
                  border: 1px solid #d1d5db;
                  color: #1a1a2e;
                  border-radius: 5px;
                  padding: 10px;
                  font-family: monospace;
                  font-size: 12px;
                  resize: vertical;
                "
                readonly
              ></textarea>
            </div>
          </div>
        </div>

        <div id="records-panel" style="display:none;flex:1;flex-direction:column;overflow:auto;padding:16px;min-width:0;"></div>
      </div>
    </div>

    <!-- BUILD:MODALS -->
    <!-- BUILD:JS -->
  </body>
</html>
